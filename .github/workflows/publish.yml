name: Publish

on:
  push:
    tags:
      - 'v*'           # tagged release -> "release" channel
  schedule:
    - cron: '0 3 * * *'   # 03:00 UTC nightly -> "nightly" channel
  workflow_dispatch:
    inputs:
      force:
        description: 'Nightly: publish even if main has not changed since the last nightly'
        type: boolean
        default: false

permissions: {}

jobs:
  # Resolve which channel this run is (release vs nightly) and all the
  # channel-specific values the downstream jobs need. A tag push is a release;
  # schedule / manual dispatch is a nightly (guarded so it only builds when main
  # changed since the rolling `nightly` tag).
  setup:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      channel: ${{ steps.resolve.outputs.channel }}
      should_publish: ${{ steps.resolve.outputs.should_publish }}
      version: ${{ steps.resolve.outputs.version }}
      npm_tag: ${{ steps.resolve.outputs.npm_tag }}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Resolve channel and version
        id: resolve
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            # Tag push -> release. Version comes from the tag; npm 'latest' dist-tag.
            VERSION="${GITHUB_REF_NAME#v}"
            echo "channel=release" >> "$GITHUB_OUTPUT"
            echo "should_publish=true" >> "$GITHUB_OUTPUT"
            echo "version=$VERSION" >> "$GITHUB_OUTPUT"
            echo "npm_tag=latest" >> "$GITHUB_OUTPUT"
            echo "Release channel: v$VERSION"
          else
            # schedule / workflow_dispatch -> nightly. Prerelease version, 'nightly' dist-tag.
            NEXT=$(node -p "const [a,b,c]=require('./package.json').version.split('.').map(Number); [a,b,c+1].join('.')")
            STAMP=$(date -u +%Y%m%dT%H%M)
            VERSION="${NEXT}-nightly.${STAMP}"
            echo "channel=nightly" >> "$GITHUB_OUTPUT"
            echo "version=$VERSION" >> "$GITHUB_OUTPUT"
            echo "npm_tag=nightly" >> "$GITHUB_OUTPUT"
            echo "Nightly channel: $VERSION"
            # Change-guard: publish only if HEAD differs from the rolling nightly tag.
            HEAD_SHA=$(git rev-parse HEAD)
            if [ "${{ github.event.inputs.force }}" = "true" ]; then
              echo "force=true requested; publishing."
              echo "should_publish=true" >> "$GITHUB_OUTPUT"
            else
              if git rev-parse -q --verify refs/tags/nightly >/dev/null; then
                LAST_SHA=$(git rev-list -n 1 nightly)
              else
                LAST_SHA=""
              fi
              echo "HEAD=$HEAD_SHA  last_nightly=${LAST_SHA:-<none>}"
              if [ -n "$LAST_SHA" ] && [ "$HEAD_SHA" = "$LAST_SHA" ]; then
                echo "main unchanged since last nightly; skipping publish."
                echo "should_publish=false" >> "$GITHUB_OUTPUT"
              else
                echo "main changed (or no prior nightly); will publish."
                echo "should_publish=true" >> "$GITHUB_OUTPUT"
              fi
            fi
          fi

  verify:
    needs: setup
    if: needs.setup.outputs.should_publish == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Validate CHANGELOG entry exists for this tag
        if: needs.setup.outputs.channel == 'release'
        run: |
          VERSION="${{ needs.setup.outputs.version }}"
          if ! grep -E "^## \[${VERSION}\]" CHANGELOG.md > /dev/null; then
            echo "::error file=CHANGELOG.md::No '## [${VERSION}]' section found in CHANGELOG.md. Add a release entry before tagging."
            exit 1
          fi
          echo "Found CHANGELOG entry for v${VERSION}"
          # Verify the section has actual content (not just empty sub-headers)
          SECTION=$(awk "/^## \[${VERSION}\]/{found=1; next} found && /^## \[/{exit} found && /[^[:space:]]/" CHANGELOG.md | grep -v "^### ")
          if [ -z "$SECTION" ]; then
            echo "::error file=CHANGELOG.md::Section ## [${VERSION}] exists but has no entries. Fill in the changelog before tagging."
            exit 1
          fi
          echo "Changelog section has content."

      - run: npm ci

      - run: npx tsc --noEmit

      - run: npm test

  publish-npm:
    needs: [setup, verify]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: 'https://registry.npmjs.org'

      - run: npm ci

      - name: Set nightly version (in-CI only, not committed)
        if: needs.setup.outputs.channel == 'nightly'
        run: npm version "${{ needs.setup.outputs.version }}" --no-git-tag-version

      - name: Publish to npm (skip if this version already exists)
        run: |
          VERSION=$(node -p "require('./package.json').version")
          if npm view "@daften/fireflyiii-mcp@${VERSION}" version > /dev/null 2>&1; then
            echo "v${VERSION} is already published to npm; skipping publish (idempotent re-run)."
          else
            npm publish --provenance --tag "${{ needs.setup.outputs.npm_tag }}"
          fi

  publish-docker:
    needs: [setup, verify]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v7

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Release pushes semver + latest; nightly pushes only nightly tags. The
      # `enable` flag selects per channel so neither leaks into the other.
      - name: Docker tags + labels
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/daften/fireflyiii-mcp
          tags: |
            type=semver,pattern={{version}},enable=${{ needs.setup.outputs.channel == 'release' }}
            type=semver,pattern={{major}}.{{minor}},enable=${{ needs.setup.outputs.channel == 'release' }}
            type=semver,pattern={{major}},enable=${{ needs.setup.outputs.channel == 'release' }}
            type=raw,value=latest,enable=${{ needs.setup.outputs.channel == 'release' }}
            type=raw,value=nightly,enable=${{ needs.setup.outputs.channel == 'nightly' }}
            type=raw,value=nightly-{{date 'YYYYMMDD'}},enable=${{ needs.setup.outputs.channel == 'nightly' }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  release:
    needs: [setup, verify, publish-npm, publish-docker]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      # softprops/action-gh-release does NOT read the git tag annotation into the
      # release body, so extract the matching CHANGELOG.md section and pass it as
      # body_path. CHANGELOG.md is the single source of truth for release notes.
      - name: Extract changelog section for release notes
        if: needs.setup.outputs.channel == 'release'
        run: |
          VERSION="${{ needs.setup.outputs.version }}"
          awk -v v="$VERSION" '
            $0 ~ "^## \\[" v "\\]" { f = 1; next }
            f && /^## \[/ { exit }
            f { print }
          ' CHANGELOG.md | awk 'NF { p = 1 } p' | tac | awk 'NF { p = 1 } p' | tac > release-notes.md
          if [ ! -s release-notes.md ]; then
            echo "::error file=CHANGELOG.md::Could not extract release notes for v${VERSION}."
            exit 1
          fi
          echo "Extracted release notes for v${VERSION}:"
          cat release-notes.md

      - name: Create GitHub Release from changelog
        if: needs.setup.outputs.channel == 'release'
        uses: softprops/action-gh-release@v3
        with:
          body_path: release-notes.md
          generate_release_notes: false

      - name: Move rolling nightly tag to HEAD
        if: needs.setup.outputs.channel == 'nightly'
        run: |
          git tag -f nightly
          git push -f origin refs/tags/nightly

      - name: Create/update nightly pre-release
        if: needs.setup.outputs.channel == 'nightly'
        uses: softprops/action-gh-release@v3
        with:
          tag_name: nightly
          target_commitish: ${{ github.sha }}
          name: "Nightly ${{ needs.setup.outputs.version }}"
          prerelease: true
          make_latest: false
          body: |
            Automated nightly build of `main`. **Unstable — for testing unreleased changes.**

            - Version: `${{ needs.setup.outputs.version }}`
            - Commit: ${{ github.sha }}
            - npm: `npm install @daften/fireflyiii-mcp@nightly`
            - Docker: `docker pull ghcr.io/daften/fireflyiii-mcp:nightly`

            > Default installs (`@latest` / `:latest`) are unaffected and continue to point at the most recent tagged release.
