name: Publish

on:
  push:
    tags:
      - 'v*'

permissions: {}

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Validate CHANGELOG entry exists for this tag
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          if ! grep -E "^## \[${VERSION}\]" CHANGELOG.md > /dev/null; then
            echo "::error file=CHANGELOG.md::No '## [${VERSION}]' section found in CHANGELOG.md. Add a release entry before tagging."
            exit 1
          fi
          echo "Found CHANGELOG entry for v${VERSION}"
          # Verify the section has actual content (not just empty headers)
          SECTION=$(awk "/^## \[${VERSION}\]/,/^## \[/" CHANGELOG.md | grep -v "^## \[" | grep -v "^$" | grep -v "^### ")
          if [ -z "$SECTION" ]; then
            echo "::error file=CHANGELOG.md::Section ## [${VERSION}] exists but has no entries. Fill in the changelog before tagging."
            exit 1
          fi
          echo "Changelog section has content."

      - run: npm ci

      - run: npx tsc --noEmit

      - run: npm test

  publish-npm:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: 'https://registry.npmjs.org'

      - run: npm ci

      - run: npm publish --provenance

  publish-docker:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker tags + labels
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/daften/fireflyiii-mcp
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest

      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  release:
    needs: [publish-npm, publish-docker]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Create GitHub Release from tag annotation
        uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: false
