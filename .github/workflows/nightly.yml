name: Nightly Integration Tests

on:
  schedule:
    - cron: '0 2 * * *'   # 02:00 UTC every night
  workflow_dispatch:        # allow manual trigger

permissions: {}

jobs:
  integration:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Install dependencies
        run: for i in 1 2 3; do npm ci && break || sleep 5; done

      - name: Start Firefly III
        run: docker compose -f docker-compose.ci.yml up -d

      - name: Create test user and token
        id: firefly-token
        run: |
          TOKEN=$(bash scripts/ci-create-token.sh http://localhost:8080)
          echo "::add-mask::$TOKEN"
          echo "token=$TOKEN" >> "$GITHUB_OUTPUT"

      - name: Run integration tests
        run: npm run test:integration
        env:
          FIREFLY_INTEGRATION: 'true'
          FIREFLY_URL: 'http://localhost:8080'
          FIREFLY_TOKEN: ${{ steps.firefly-token.outputs.token }}

      - name: Stop Firefly III
        if: always()
        run: docker compose -f docker-compose.ci.yml down
