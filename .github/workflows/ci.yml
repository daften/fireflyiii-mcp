name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions: {}

jobs:
  changelog:
    if: github.event_name == 'pull_request' && github.actor != 'dependabot[bot]'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Verify CHANGELOG.md is updated
        run: |
          BASE="${{ github.event.pull_request.base.sha }}"
          HEAD="${{ github.event.pull_request.head.sha }}"
          TITLE="${{ github.event.pull_request.title }}"
          if echo "$TITLE" | grep -qi '\[skip changelog\]'; then
            echo "Skipping changelog check ([skip changelog] in PR title)."
            exit 0
          fi
          if git diff --name-only "$BASE" "$HEAD" | grep -q "^CHANGELOG.md$"; then
            echo "CHANGELOG.md updated."
          else
            echo "::error file=CHANGELOG.md::CHANGELOG.md was not updated. Add an entry under [Unreleased], or include '[skip changelog]' in the PR title for chore/docs-only changes."
            exit 1
          fi

  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        node-version: [20, 22, 24]
    name: test (node ${{ matrix.node-version }})
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}

      - name: Install dependencies
        run: for i in 1 2 3; do npm ci && break || sleep 5; done

      - name: Audit dependencies (production only)
        run: npm audit --audit-level=moderate --omit=dev

      - name: Lint (Biome)
        run: npx biome ci src/

      - run: npx tsc --noEmit

      - run: npm test
