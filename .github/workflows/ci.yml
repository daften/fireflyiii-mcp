name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: for i in 1 2 3; do npm ci && break || sleep 5; done

      - run: npx tsc --noEmit

      - run: npm test
